<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Cartão de Visitas Digital</title>
    <style>
        body {
            font-family: 'Helvetica', Arial, sans-serif;
            background-color: #f4f6f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 90%;
        }
        iframe {
            border: none;
            width: 380px;
            height: 240px;
            border-radius: 8px;
        }
        .btn-download {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #2E4053;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-download:hover {
            background-color: #1c2833;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Visualização do Cartão Digital</h2>
        <iframe src="cartao_visitas.pdf"></iframe>
        
        <br>
        <a href="cartao_visitas.pdf" download="Cartao_Visitas.pdf" class="btn-download">
            Baixar Cartão (PDF)
        </a>
    </div>

</body>
</html>
